# Konfiguracja Streamlit — StockFlow Brand Guide v1.1
# Paleta: #22C55E (primary green), #14B8A6 (teal), #1F2937 (dark bg), #F8FAFC (text)

[theme]
base                     = "dark"
primaryColor             = "#22C55E"
backgroundColor          = "#1F2937"
secondaryBackgroundColor = "#111827"
textColor                = "#F8FAFC"
font                     = "sans serif"

[client]
showErrorDetails         = false

[server]
headless                 = true
