[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.virtualenv"]

[phases.install]
cmds = [
  "python3.11 -m venv /app/.venv",
  "/app/.venv/bin/pip install --upgrade pip",
  "/app/.venv/bin/pip install -r requirements-backend.txt"
]

[start]
cmd = "/app/.venv/bin/uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 2"
